type: article
title: "Mobile app-based psychological interventions for depression and anxiety in primary care: A systematic review and meta-analysis"
authors:
  - "González-Robles, A."
  - "Romero-Ferreiro, V."
  - "Roca, P."
  - "Rodríguez-Jiménez, T."
  - "Díaz-García, A."
venue: "General Hospital Psychiatry, 100, 62–71"
year: 2026
date: 2026-03-10
doi: 10.1016/j.genhosppsych.2026.03.008
url: https://doi.org/10.1016/j.genhosppsych.2026.03.008
featured: false
summary:
  es: >-
    Revisión sistemática y metaanálisis de 11 ensayos controlados aleatorizados
    (N = 2915) sobre intervenciones psicológicas basadas en apps móviles para la
    depresión y la ansiedad en atención primaria. Las apps redujeron el malestar
    y los síntomas depresivos y mejoraron levemente la calidad de vida, sin efectos
    significativos sobre la ansiedad y con mayores tasas de abandono.
  en: >-
    Systematic review and meta-analysis of 11 randomized controlled trials
    (N = 2915) on mobile app-based psychological interventions for depression and
    anxiety in primary care. Apps reduced distress and depressive symptoms and
    modestly improved quality of life, with no significant effect on anxiety and
    higher dropout rates.
