type: article
title: "Artificial intelligence in the psychologist's toolkit: Psypilot as a case study"
authors:
  - "Roca, P."
  - "Zangri, R. M."
  - "Rodríguez-Fernández, G."
  - "Sánchez-Pedreño, M."
  - "García del Valle, E. P."
venue: Frontiers in Psychology
year: 2026
date: 2026-02-27
doi: 10.3389/fpsyg.2026.1775464
url: https://www.frontiersin.org/journals/psychology/articles/10.3389/fpsyg.2026.1775464/full
featured: false
summary:
  es: >-
    Artículo de perspectiva que analiza cómo la IA —en especial el machine learning
    y los grandes modelos de lenguaje— se integra en las tareas centrales del
    psicólogo, y presenta Psypilot como caso de estudio del paradigma de «copiloto»:
    un asistente clínico basado en IA que potencia el juicio profesional preservando
    el núcleo relacional y ético de la práctica.
  en: >-
    Perspective article examining how AI —especially machine learning and large
    language models— maps onto psychologists' core tasks, presenting Psypilot as a
    case study of the "copilot" paradigm: an AI-powered clinical assistant that
    augments professional judgment while preserving the relational and ethical core
    of practice.
