type: article
title: "Inteligencia artificial aplicada a la psicología: el ejemplo de Psypilot como copiloto terapéutico"
authors:
  - "Roca, P."
  - "Sánchez-Pedreño, M."
  - "Rodríguez-Fernández, G."
  - "García del Valle, E. P."
  - "Zangri, R. M."
venue: "Apuntes de Psicología, 44(2), 77–84"
year: 2026
date: 2026-03-30
doi: 10.70478/apuntes.psi.2026.44.09
url: https://www.apuntesdepsicologia.es/index.php/revista/article/view/1712
featured: false
summary:
  es: >-
    Revisa las aplicaciones de la inteligencia artificial en psicología, desde la
    evaluación hasta la documentación, y presenta Psypilot como ejemplo de copiloto
    terapéutico que potencia el juicio clínico sin sustituir al profesional,
    operacionalizando la salud mental de precisión bajo un marco ético «human-in-the-loop».
  en: >-
    Reviews the applications of artificial intelligence in psychology, from assessment
    to documentation, and presents Psypilot as an example of a therapeutic co-pilot
    that augments clinical judgement without replacing the professional, operationalizing
    precision mental health within a "human-in-the-loop" ethical framework.
