summary:
  es: >-
    Sintetiza los pilares operativos de la salud mental de precisión —el cuidado
    basado en la medición y la toma de decisiones basada en datos— y presenta el
    proyecto NOVA, una iniciativa traslacional diseñada para superar las barreras
    actitudinales, tecnológicas, estadísticas y contextuales de la implementación
    de estas herramientas en España.
  en: >-
    Summarizes the operational pillars of precision mental health —measurement-based
    care and data-driven decision-making— and introduces the NOVA project, a
    translational initiative designed to overcome the attitudinal, technological,
    statistical and contextual barriers to implementing these tools in Spain.
